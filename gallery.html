<!DOCTYPE html>
<html>
<head>
<title>Photo Gallery</title>
<link rel="stylesheet" href="style.css">

<style>

.slider{
width:100%;
overflow:hidden;
}

.slider img{
width:100%;
display:none;
border-radius:12px;
}

.slider img.active{
display:block;
}

</style>

</head>

<body>
<header>
<img src="images/banner1.png" class="banner">
</header>
  

<div class="container">

<div class="card">

<h1>Bangalore Trip Gallery</h1>

<div class="slider">

<img src="images/gallery1.jpg" class="active">
<img src="images/gallery2.jpg">
<img src="images/gallery3.jpg">
<img src="images/gallery4.jpg">
<img src="images/gallery5.jpg">
<img src="images/gallery6.jpg">

</div>

</div>

</div>

<script>

let slides=document.querySelectorAll('.slider img');
let current=0;

setInterval(()=>{

slides[current].classList.remove('active');

current++;

if(current>=slides.length)
current=0;

slides[current].classList.add('active');

},3000);

</script>

</body>
</html>
